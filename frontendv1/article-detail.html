<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Detail - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .back-nav {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
            width: fit-content;
        }

        .back-nav:hover {
            color: var(--primary-color);
        }

        .article-header {
            margin-bottom: 3rem;
        }

        .article-title-large {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-heading);
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .article-subtitle-large {
            font-size: 1.25rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .author-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 3rem;
        }

        .author-avatar-large {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #7928ca);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-heading);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .author-details h3 {
            font-size: 1.1rem;
            color: var(--text-heading);
            margin-bottom: 0.25rem;
        }

        .author-details p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .article-cover-image {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 3rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .article-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #e6edf3;
            margin-bottom: 4rem;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-actions {
            display: flex;
            gap: 2rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 4rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.21s;
        }

        .action-btn:hover {
            color: var(--primary-color);
        }

        .action-btn.liked {
            color: #f85149;
        }

        .comments-section {
            margin-bottom: 5rem;
        }

        .comments-title {
            font-size: 1.5rem;
            color: var(--text-heading);
            margin-bottom: 2rem;
        }

        .comment-form {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 3rem;
        }

        .comment-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-heading);
            padding: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .comment-item {
            display: flex;
            gap: 1rem;
        }

        .comment-content {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .comment-author {
            font-weight: 600;
            color: var(--text-heading);
            font-size: 0.95rem;
        }

        .comment-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .comment-text {
            color: #d1d5db;
            line-height: 1.5;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item active"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="article-container">
                <a href="community.html" class="back-nav">
                    <span>←</span> Back to Community
                </a>

                <div id="article-loading" style="text-align: center; padding: 4rem;">
                    <div class="spinner"></div>
                    <p style="color: var(--text-muted); margin-top: 1rem;">Loading article...</p>
                </div>

                <div id="article-content-wrapper" style="display: none;">
                    <header class="article-header">
                        <div id="article-category-badge" style="margin-bottom: 1rem;"></div>
                        <h1 class="article-title-large" id="article-title"></h1>
                        <p class="article-subtitle-large" id="article-subtitle"></p>
                    </header>

                    <div class="author-card">
                        <div class="author-avatar-large" id="author-avatar">J</div>
                        <div class="author-details">
                            <h3 id="author-name">Author Name</h3>
                            <p id="article-date-read"></p>
                        </div>
                        <div style="flex: 1; text-align: right;">
                            <button class="btn btn-secondary btn-sm" id="follow-btn">Follow</button>
                        </div>
                    </div>

                    <img src="" alt="Cover" class="article-cover-image" id="article-cover" style="display: none;">

                    <div class="article-content" id="article-body">
                        <!-- Content injection -->
                    </div>

                    <div class="article-actions">
                        <button class="action-btn" id="like-btn">
                            <span id="like-icon">❤️</span>
                            <span id="like-count">0</span> Likes
                        </button>
                        <button class="action-btn">
                            <span><i data-lucide="message-square" class="nav-icon"></i></span>
                            <span id="comment-count-top">0</span> Comments
                        </button>
                        <button class="action-btn" id="share-btn">
                            <span><i data-lucide="link" class="nav-icon"></i></span> Share
                        </button>
                    </div>

                    <section class="comments-section">
                        <h2 class="comments-title">Comments (<span id="comment-count-bottom">0</span>)</h2>

                        <div class="comment-form">
                            <textarea class="comment-input" id="new-comment"
                                placeholder="What are your thoughts?"></textarea>
                            <div style="display: flex; justify-content: flex-end;">
                                <button class="btn btn-primary" id="post-comment-btn">Post Comment</button>
                            </div>
                        </div>

                        <div class="comment-list" id="comment-list">
                            <!-- Comments injection -->
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (!articleId) {
            window.location.href = 'community.html';
        }

        let currentArticle = null;

        async function loadArticle() {
            try {
                const article = await apiFetch(`/articles/${articleId}`);
                currentArticle = article;

                document.getElementById('article-loading').style.display = 'none';
                document.getElementById('article-content-wrapper').style.display = 'block';

                document.title = `${article.title} - Co-Notes`;
                document.getElementById('article-title').innerText = article.title;
                document.getElementById('article-subtitle').innerText = article.subtitle || "";
                
                // Fix Notes Body Display Issue: Safely render text while preserving line breaks
                const bodyEl = document.getElementById('article-body');
                bodyEl.textContent = article.content;
                bodyEl.style.whiteSpace = 'pre-wrap';

                const date = new Date(article.publishedAt || article.createdAt);
                document.getElementById('article-date-read').innerText =
                    `${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })} · ${article.readTime || '3 min'} read`;

                document.getElementById('author-name').innerText = article.author.name;
                const authorAvatar = document.getElementById('author-avatar');
                if (article.author.avatar) {
                    authorAvatar.innerHTML = `<img src="${article.author.avatar}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
                } else {
                    authorAvatar.innerText = article.author.name.charAt(0).toUpperCase();
                }

                // Check Follow status if possible
                const currentUser = getCurrentUser();
                const followBtn = document.getElementById('follow-btn');
                if (currentUser && currentUser._id === article.author._id) {
                    followBtn.style.display = 'none'; // Cannot follow oneself
                } else {
                    // Try to fetch profile to see current follow status, or just leave it for toggle
                    // (To fully optimize, user object could just track following locally, but for simplicity: )
                    followBtn.dataset.authorId = article.author._id || article.author.id;
                }

                if (article.coverImage) {
                    document.getElementById('article-cover').src = resolveApiAssetUrl(article.coverImage);
                    document.getElementById('article-cover').style.display = 'block';
                }

                document.getElementById('article-category-badge').innerHTML =
                    `<span class="badge" style="background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent);">${article.category || 'General'}</span>`;

                document.getElementById('like-count').innerText = article.likes || 0;
                document.getElementById('comment-count-top').innerText = article.commentsCount || 0;
                document.getElementById('comment-count-bottom').innerText = article.commentsCount || 0;

                loadComments();
            } catch (error) {
                console.error("Failed to load article:", error);
                document.getElementById('article-loading').innerHTML = `
                    <p style="color: var(--danger-color);">Error: ${error.message}</p>
                    <a href="community.html" class="btn btn-secondary" style="margin-top: 1rem;">Back to Feed</a>
                `;
            }
        }

        async function loadComments() {
            try {
                const comments = await apiFetch(`/articles/${articleId}/comments`);
                const container = document.getElementById('comment-list');
                container.innerHTML = '';

                if (comments.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No comments yet. Be the first to share your thoughts!</p>';
                    return;
                }

                comments.forEach(comment => {
                    const date = new Date(comment.createdAt);
                    const initial = comment.user.name.charAt(0).toUpperCase();

                    const item = document.createElement('div');
                    item.className = 'comment-item';
                    item.innerHTML = `
                        <div class="author-avatar" style="width: 40px; height: 40px; font-size: 1.1rem;">
                            ${comment.user.avatar ? `<img src="${comment.user.avatar}" style="width: 100%; height: 100%; border-radius: 50%;">` : initial}
                        </div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <span class="comment-author">${comment.user.name}</span>
                                <span class="comment-date">${date.toLocaleDateString()}</span>
                            </div>
                            <p class="comment-text">${comment.content}</p>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (error) {
                console.error("Failed to load comments:", error);
            }
        }

        document.getElementById('like-btn').addEventListener('click', async () => {
            const btn = document.getElementById('like-btn');
            try {
                const result = await apiFetch(`/articles/${articleId}/like`, { method: 'POST' });
                // Result has 'liked' boolean
                const countEl = document.getElementById('like-count');
                let count = parseInt(countEl.innerText);
                if (result.liked) {
                    btn.classList.add('liked');
                    countEl.innerText = count + 1;
                } else {
                    btn.classList.remove('liked');
                    countEl.innerText = Math.max(0, count - 1);
                }
            } catch (error) {
                console.error("Like error:", error);
            }
        });

        document.getElementById('follow-btn').addEventListener('click', async (e) => {
            const btn = e.target;
            const authorId = btn.dataset.authorId;
            if (!authorId) return;
            
            try {
                const result = await apiFetch(`/users/${authorId}/follow`, { method: 'POST' });
                if (result.following) {
                    btn.innerText = 'Unfollow';
                    btn.classList.add('btn-primary');
                    btn.classList.remove('btn-secondary');
                } else {
                    btn.innerText = 'Follow';
                    btn.classList.add('btn-secondary');
                    btn.classList.remove('btn-primary');
                }
            } catch (error) {
                console.error("Follow error:", error);
            }
        });

        document.getElementById('share-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Link copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy link:', err);
            });
        });

        document.getElementById('post-comment-btn').addEventListener('click', async () => {
            const input = document.getElementById('new-comment');
            const content = input.value.trim();
            if (!content) return;

            const btn = document.getElementById('post-comment-btn');
            btn.disabled = true;
            btn.innerText = 'Posting...';

            try {
                await apiFetch(`/articles/${articleId}/comments`, {
                    method: 'POST',
                    body: JSON.stringify({ content })
                });
                input.value = '';
                loadComments();
                // Update counts
                const topCount = document.getElementById('comment-count-top');
                const bottomCount = document.getElementById('comment-count-bottom');
                topCount.innerText = parseInt(topCount.innerText) + 1;
                bottomCount.innerText = topCount.innerText;
            } catch (error) {
                alert("Failed to post comment: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Post Comment';
            }
        });

        loadArticle();
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>

</html>
