<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Feed - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .feed-layout {
            max-width: 680px;
            margin: 0 auto;
        }

        .category-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .category-tab {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
        }

        .category-tab.active,
        .category-tab:hover {
            background-color: var(--primary-color);
            color: var(--text-heading);
            border-color: var(--primary-color);
        }

        .article-card {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            gap: 12px;
        }

        .article-card:hover {
            background-color: var(--glass-panel, rgba(255,255,255,0.02));
        }

        .article-meta {
            display: flex;
            align-items: center;
            margin-bottom: 0.2rem;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8ff78, #78ffd6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            flex-shrink: 0;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            color: var(--text-heading);
            font-size: 0.9rem;
        }

        .post-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .article-title {
            font-size: 1.5rem;
            color: var(--text-heading);
            margin-bottom: 0.5rem;
        }

        .article-excerpt {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .stat-item:hover {
            color: var(--primary-color);
        }

        @media (max-width: 680px) {
            .article-card {
                padding: 1rem 0.5rem;
            }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item active"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>Community Feed</span>
                </div>
                <div class="header-right">
                    <a href="write-article.html" class="btn btn-primary"><i data-lucide="pen-tool" class="nav-icon"></i> Write & Publish</a>
                </div>
            </header>

            <div class="page-content">
                <!-- Top Nav Container -->
                <div style="max-width: 1200px; margin: 0 auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; gap: 2rem;">
                        <div style="position: relative; flex: 1; max-width: 500px;">
                            <input type="text" id="feedSearch" placeholder="Search articles, tutorials, or topics..." 
                                style="width: 100%; background: var(--card-bg); border: 2px solid var(--border-color); color: var(--text-heading); padding: 0.8rem 1rem 0.8rem 3rem; border-radius: 12px; font-size: 1rem; outline: none; transition: all 0.2s;">
                            <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem;"><i data-lucide="search" class="nav-icon"></i></span>
                        </div>
                        <div class="category-nav" style="margin-bottom: 0; padding-bottom: 0;">
                            <button class="category-tab active">For You</button>
                            <button class="category-tab">Trending Now</button>
                            <button class="category-tab">Coding</button>
                            <button class="category-tab">Business</button>
                            <button class="category-tab">Marketing</button>
                            <button class="category-tab">Design</button>
                        </div>
                    </div>

                    <div class="page-title">
                        <span style="font-size: 2.5rem; color: #bc8cff;"><i data-lucide="globe" class="nav-icon"></i></span>
                        <h1 style="font-size: 2.5rem;">Community Feed</h1>
                    </div>
                    <p class="page-subtitle" style="font-size: 1.1rem; margin-bottom: 3rem;">Discover ideas, tutorials, and stories from the Co-Notes community.</p>
                </div>

                <div class="feed-layout">
                    <!-- Feed Column -->
                    <div class="feed-column" id="feedColumn" style="border-right: 1px solid var(--border-color); border-left: 1px solid var(--border-color); min-height: 100vh;">
                        <!-- Dynamic Articles -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();

        let articles = [];
        let activeCategory = 'For You';

        const feedColumn = document.getElementById('feedColumn');

        function formatRelativeTime(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const min = Math.floor(diff / 60000);
            if (min < 1) return 'Just now';
            if (min < 60) return `${min}m ago`;
            const hrs = Math.floor(min / 60);
            if (hrs < 24) return `${hrs}h ago`;
            return `${Math.floor(hrs / 24)}d ago`;
        }

        function renderFeed() {
            feedColumn.innerHTML = '';

            let filtered = articles;
            if (activeCategory !== 'For You') {
                filtered = articles.filter(a => (a.category || '').toLowerCase() === activeCategory.toLowerCase() || (a.tags || []).includes(activeCategory.toLowerCase()));
            }

            if (filtered.length === 0) {
                feedColumn.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">No posts found in this category.</p>';
                return;
            }

            filtered.forEach(article => {
                const authorName = article.author ? (article.author.name || article.author.username || 'Anonymous') : 'Anonymous';
                const initial = authorName.charAt(0).toUpperCase();
                const timeStr = formatRelativeTime(article.createdAt);
                const likeCount = typeof article.likes === 'number' ? article.likes : (article.likes || []).length;
                const commentCount = typeof article.comments === 'number' ? article.comments : (article.comments || []).length;
                const coverImageUrl = resolveApiAssetUrl(article.coverImage);

                const card = document.createElement('div');
                card.className = 'article-card';
                card.onclick = () => { window.location.href = `article-detail.html?id=${article.id || article._id}`; };

                card.innerHTML = `
                    <div class="author-avatar" style="width: 44px; height: 44px; font-size: 1.2rem; flex-shrink: 0; margin-top: 4px;">${initial}</div>
                    <div style="flex: 1; min-width: 0;">
                        <div class="article-meta" style="margin-bottom: 0.15rem;">
                            <span class="author-name" style="margin-right: 0.4rem; font-size: 0.95rem;">${authorName}</span>
                            <span class="post-time" style="font-size: 0.85rem;">@${authorName.toLowerCase().replace(/\s/g, '')} • ${timeStr} • ${article.category || 'General'}</span>
                        </div>
                        <h2 class="article-title" style="font-size: 1.1rem; margin-bottom: 0.4rem; line-height: 1.35; font-weight: 500;">${article.title}</h2>
                        <p class="article-excerpt" style="font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.8rem; color: var(--text-color);">${article.subtitle || article.content}</p>
                        
                        ${coverImageUrl ? `<div style="margin-bottom: 1rem; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);"><img src="${coverImageUrl}" alt="${article.title}" style="width: 100%; max-height: 400px; object-fit: cover; display: block;"></div>` : ''}
                        
                        <div style="display: flex; justify-content: space-between; max-width: 400px; color: var(--text-muted); font-size: 0.85rem;">
                            <span class="stat-item"><i data-lucide="message-square" class="nav-icon"></i> ${commentCount}</span>
                            <span class="stat-item">🔁 0</span>
                            <span class="stat-item">❤️ ${likeCount}</span>
                            <span class="stat-item"><i data-lucide="bar-chart-2" class="nav-icon"></i> ${article.readTime || '3'}m</span>
                            <span class="stat-item">📤</span>
                        </div>
                    </div>
                `;
                feedColumn.appendChild(card);
            });
        }

        async function loadFeed(cat = '', search = '') {
            try {
                let url = '/articles/feed';
                const params = new URLSearchParams();
                if (cat && cat !== 'For You') params.append('category', cat.toLowerCase());
                if (search) params.append('search', search);
                
                if (params.toString()) url += `?${params.toString()}`;

                const response = await apiFetch(url);
                articles = response.articles || response || [];
                renderFeed();
            } catch (error) {
                console.error('Failed to load community feed', error);
                feedColumn.innerHTML = '<p style="color: var(--danger-color); text-align: center;">Failed to load feed. Check your connection.</p>';
            }
        }

        // Tab logic
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                activeCategory = e.target.textContent;
                loadFeed(activeCategory, document.getElementById('feedSearch').value);
            });
        });

        // Search logic
        let searchTimeout;
        document.getElementById('feedSearch').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadFeed(activeCategory, e.target.value);
            }, 500);
        });

        loadFeed();
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>

</html>
