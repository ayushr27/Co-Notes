<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .auth-page {
            position: relative;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* Animated background orbs for auth */
        .auth-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
            opacity: 0.5;
        }

        .orb-blue {
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.18);
            top: -100px;
            right: -100px;
        }

        .orb-purple {
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, 50px) scale(1.1); }
        }

        .premium-auth-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 2.5rem 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            font-size: 2.5rem;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.15));
            transition: transform 0.3s ease;
        }
        
        .auth-logo:hover {
            transform: scale(1.05);
        }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4d8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .premium-form-control {
            background: var(--glass-panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text-heading);
            width: 100%;
            transition: all 0.3s ease;
        }

        .premium-form-control:focus {
            background: var(--glass-header);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
            outline: none;
        }

        .form-group label {
            color: var(--text-heading);
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .premium-btn {
            background: var(--primary-color);
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.12);
            margin-top: 1rem;
        }

        .premium-btn:hover {
            transform: translateY(-2px);
            background: var(--btn-primary-hover);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .premium-btn:disabled {
            opacity: 0.7;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .forgot-pass {
            font-size: 0.8rem;
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-pass:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        
        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .btn-social {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-heading);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        
        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .auth-content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
        }

        .auth-layout {
            width: 100%;
            max-width: 1120px;
            display: flex;
            gap: 4rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .how-it-works {
            flex: 1;
            min-width: 300px;
            max-width: 520px;
        }

        .how-title {
            font-size: 2.2rem;
            line-height: 1.15;
            color: var(--text-heading);
            margin-bottom: 0.8rem;
        }

        .how-title span {
            background: linear-gradient(135deg, #ffffff 0%, #d4d4d8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .how-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .how-steps {
            display: flex;
            flex-direction: column;
            gap: 1.35rem;
        }

        .how-step {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .how-icon {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            color: var(--text-heading);
        }

        .how-step h3 {
            color: var(--text-heading);
            font-size: 1.05rem;
            margin-bottom: 0.2rem;
        }

        .how-step p {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.55;
        }

        @media (max-width: 960px) {
            .auth-layout {
                gap: 2rem;
            }

            .how-it-works {
                width: 100%;
                max-width: 620px;
            }

            .how-title,
            .how-subtitle {
                text-align: center;
            }
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page" style="min-height: 100vh; display: flex; flex-direction: column;">
    <div class="auth-orb orb-blue"></div>
    <div class="auth-orb orb-purple"></div>

    <div class="auth-content">
        <div class="auth-layout" style="justify-content: center;">
            <div class="premium-auth-card" style="margin: 0 auto; max-width: 480px;">
                <div class="auth-header">
                    <a href="index.html" class="auth-logo"><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></a>
                    <h1 class="auth-title">Reset password</h1>
                    <p class="auth-subtitle">Enter your email to receive a reset link</p>
                </div>

                <div id="error-msg" style="display: none; background: rgba(248, 81, 73, 0.15); border: 1px solid rgba(248, 81, 73, 0.3); color: #ff7b72; padding: 12px 16px; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; backdrop-filter: blur(4px);"></div>
                <div id="success-msg" style="display: none; background: rgba(46, 160, 67, 0.15); border: 1px solid rgba(46, 160, 67, 0.3); color: #3fb950; padding: 12px 16px; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; backdrop-filter: blur(4px);"></div>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" class="premium-form-control" placeholder="you@example.com" required autocomplete="email">
                    </div>

                    <button type="submit" id="submitBtn" class="premium-btn">
                        Send Reset Link
                    </button>
                </form>

                <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                    Remember your password? <a href="login.html" style="color: var(--text-heading); text-decoration: none; font-weight: 500;">Log in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }
        
        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.innerHTML = loading ? '<span style="display:flex;align-items:center;justify-content:center;gap:8px;"><svg class="animate-spin" style="animation: spin 1s linear infinite;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Sending...</span>' : 'Send Reset Link';
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const email = document.getElementById('email').value;

            setLoading(true);
            try {
                const response = await apiFetch('/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });

                showSuccess(response.message || 'Reset link requested.');
            } catch (error) {
                showError(error.message || 'Failed to request reset link. Please try again.');
            } finally {
                setLoading(false);
            }
        });
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>
</html>
