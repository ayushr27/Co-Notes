<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .idea-form {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .idea-input {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.25rem;
            outline: none;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .idea-desc {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            outline: none;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .idea-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        .idea-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .tag.active {
            background-color: var(--primary-color);
            color: var(--text-heading);
        }

        .tag-input {
            background: none;
            border: none;
            color: var(--text-color);
            outline: none;
            width: 80px;
            font-size: 0.8rem;
        }

        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .idea-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
            position: relative;
        }

        .idea-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border-color: #8b949e;
        }

        .idea-card.starred {
            border-top: 3px solid #e3b341;
        }

        .idea-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .idea-card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-heading);
            margin-bottom: 0.5rem;
        }

        .idea-card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .idea-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item active"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">My Projects</div>
                    <a href="collaborate.html" class="nav-item"><i data-lucide="users" class="nav-icon"></i> Projects</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>Idea Board</span>
                </div>
            </header>

            <div class="page-content">
                <div class="page-title">
                    <span style="font-size: 2.5rem; color: #f1e05a;"><i data-lucide="lightbulb" class="nav-icon"></i></span>
                    <h1>Idea Board</h1>
                </div>
                <p class="page-subtitle">Plant your seeds of inspiration. Grow them later.</p>

                <form class="idea-form" id="ideaForm">
                    <input type="text" id="iTitle" class="idea-input" placeholder="What's your brilliant idea? 🌟"
                        required autocomplete="off">
                    <textarea id="iDesc" class="idea-desc" placeholder="Add some details..."></textarea>

                    <div class="idea-actions">
                        <div class="idea-tags" id="formTags">
                            <!-- Selected tags -->
                            <input type="text" id="iTagInput" class="tag-input" placeholder="+ Add tag"
                                autocomplete="off">
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="button" class="btn btn-secondary" title="Use Voice" id="ideaNotesMicBtn"
                                onclick="startDictation('iDesc', 'ideaNotesMicBtn')">🎤</button>
                            <button type="button" class="btn btn-secondary" onclick="generateAiIdea()" title="Generate Idea with AI">✨ AI Generate</button>
                            <button type="submit" class="btn btn-primary">Save Idea</button>
                        </div>
                    </div>
                </form>

                <div style="margin-bottom: 2rem; display: flex; gap: 0.5rem;" id="filterTags">
                    <span class="tag active" data-tag="all">All</span>
                    <span class="tag" data-tag="product">product</span>
                    <span class="tag" data-tag="marketing">marketing</span>
                    <span class="tag" data-tag="design">design</span>
                </div>

                <div class="ideas-grid" id="ideasGrid">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();

        let ideas = [];

        let activeFilter = 'all';
        let currentFormTags = [];

        const tagInput = document.getElementById('iTagInput');

        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const val = tagInput.value.trim().toLowerCase();
                if (val && !currentFormTags.includes(val)) {
                    currentFormTags.push(val);
                    renderFormTags();
                }
                tagInput.value = '';
            }
        });

        function renderFormTags() {
            const container = document.getElementById('formTags');
            // Keep input, remove others
            Array.from(container.children).forEach(c => {
                if (c.id !== 'iTagInput') c.remove();
            });

            currentFormTags.forEach(tag => {
                const el = document.createElement('span');
                el.className = 'tag';
                el.innerHTML = `${tag} &times;`;
                el.onclick = () => {
                    currentFormTags = currentFormTags.filter(t => t !== tag);
                    renderFormTags();
                };
                container.insertBefore(el, tagInput);
            });
        }

        const grid = document.getElementById('ideasGrid');

        function renderIdeas() {
            grid.innerHTML = '';

            const filtered = ideas.filter(i => {
                if (activeFilter === 'all') return true;
                return (i.tags || []).includes(activeFilter);
            });

            // sort by starred
            const sorted = [...filtered].sort((a, b) => {
                const aStar = a.isStarred || a.starred;
                const bStar = b.isStarred || b.starred;
                if (aStar !== bStar) return aStar ? -1 : 1;
                return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
            });

            sorted.forEach(idea => {
                const title = idea.title || idea.text;
                const desc = idea.description || idea.desc || '';
                const isStarred = idea.isStarred || idea.starred;
                const id = idea._id || idea.id;
                const tags = idea.tags || [];

                const div = document.createElement('div');
                div.className = `idea-card ${isStarred ? 'starred' : ''}`;

                div.innerHTML = `
                    <div class="idea-card-header">
                        <h3 class="idea-card-title">${title}</h3>
                        <button class="btn btn-secondary" style="padding: 0.25rem; font-size: 0.8rem;" onclick="toggleStar('${id}')">
                            ${isStarred ? '<i data-lucide="star" class="nav-icon"></i>' : '☆'}
                        </button>
                    </div>
                    <p class="idea-card-desc">${desc}</p>
                    <div class="idea-card-footer">
                        <div class="idea-tags">
                            ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                        <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem;" onclick="deleteIdea('${id}')"><i data-lucide="trash-2" class="nav-icon"></i></button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        async function fetchIdeas() {
            try {
                const response = await apiFetch('/ideas');
                ideas = response.ideas || response || [];

                // Extract unique tags for filtering
                const allTags = new Set(['all']);
                ideas.forEach(i => (i.tags || []).forEach(t => allTags.add(t)));

                const filterContainer = document.getElementById('filterTags');
                filterContainer.innerHTML = Array.from(allTags).map(t =>
                    `<span class="tag ${t === activeFilter ? 'active' : ''}" data-tag="${t}">${t}</span>`
                ).join('');

                // Re-bind click events to new filter tags
                document.querySelectorAll('#filterTags .tag').forEach(t => {
                    t.addEventListener('click', (e) => {
                        document.querySelectorAll('#filterTags .tag').forEach(el => el.classList.remove('active'));
                        e.target.classList.add('active');
                        activeFilter = e.target.getAttribute('data-tag');
                        renderIdeas();
                    });
                });

                renderIdeas();
            } catch (error) {
                console.error('Failed to fetch ideas:', error);
            }
        }

        window.toggleStar = async (id) => {
            const idea = ideas.find(i => (i._id || i.id) === id);
            if (!idea) return;

            const newStar = !(idea.isStarred || idea.starred);
            idea.isStarred = newStar;
            idea.starred = newStar;
            renderIdeas();

            try {
                await apiFetch(`/ideas/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ isStarred: newStar })
                });
            } catch (error) {
                // revert
                idea.isStarred = !newStar;
                idea.starred = !newStar;
                renderIdeas();
                alert('Failed to update star');
            }
        };

        window.deleteIdea = async (id) => {
            if (!confirm("Delete this idea?")) return;
            try {
                await apiFetch(`/ideas/${id}`, { method: 'DELETE' });
                ideas = ideas.filter(i => (i._id || i.id) !== id);
                renderIdeas();
            } catch (error) {
                alert('Failed to delete idea');
            }
        };

        window.generateAiIdea = async () => {
            const titleInput = document.getElementById('iTitle');
            const descInput = document.getElementById('iDesc');
            const previousTitle = titleInput.value;
            
            titleInput.value = "Generating idea...";
            descInput.value = "Please wait, AI is thinking...";
            
            const btn = document.querySelector('button[onclick="generateAiIdea()"]');
            btn.disabled = true;
            btn.innerText = "✨ Generating...";

            try {
                const response = await apiFetch('/ai/generate-idea', {
                    method: 'POST',
                    body: JSON.stringify({ topic: previousTitle })
                });
                titleInput.value = response.title || 'Brilliant Idea';
                descInput.value = response.description || '';
            } catch (error) {
                alert('AI Generation failed: ' + error.message);
                titleInput.value = previousTitle;
                descInput.value = '';
            } finally {
                btn.disabled = false;
                btn.innerText = "✨ AI Generate";
            }
        };

        document.getElementById('ideaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;

            const payload = {
                title: document.getElementById('iTitle').value,
                description: document.getElementById('iDesc').value,
                tags: [...currentFormTags],
            };

            try {
                const response = await apiFetch('/ideas', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const newIdea = response.idea || response;
                ideas.unshift(newIdea);

                document.getElementById('iTitle').value = '';
                document.getElementById('iDesc').value = '';
                currentFormTags = [];
                renderFormTags();
                renderIdeas();
            } catch (error) {
                alert('Failed to save idea: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Voice Input
        window.startDictation = (inputId, btnId) => {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert("Speech recognition is not supported in this browser. Try Chrome.");
                return;
            }

            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRec();
            
            recognition.continuous = false;
            recognition.interimResults = false;
            
            btn.style.color = '#ef4444'; // turn red indicating listening
            
            recognition.start();

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                input.value += (input.value ? ' ' : '') + text;
                btn.style.color = '';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error', event.error);
                btn.style.color = '';
                alert('Microphone error: ' + event.error);
            };

            recognition.onend = () => {
                btn.style.color = '';
            };
        };

        // Initial fetch
        fetchIdeas();
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>

</html>
