<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .idea-form {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .idea-input {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.25rem;
            outline: none;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .idea-desc {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            outline: none;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .idea-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        .idea-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .tag.active {
            background-color: var(--primary-color);
            color: #fff;
        }

        .tag-input {
            background: none;
            border: none;
            color: var(--text-color);
            outline: none;
            width: 80px;
            font-size: 0.8rem;
        }

        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .idea-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
            position: relative;
        }

        .idea-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border-color: #8b949e;
        }

        .idea-card.starred {
            border-top: 3px solid #e3b341;
        }

        .idea-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .idea-card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .idea-card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .idea-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span>📝</span> Co-Notes
                </a>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="collections.html" class="nav-item">📁 Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item active">💡 Ideas</a>
                    <a href="quick-notes.html" class="nav-item">⚡ Quick Notes</a>
                    <a href="todos.html" class="nav-item">☑️ To-Do List</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item">🌐 Feed</a>
                    <a href="write-article.html" class="nav-item">✍️ Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item">👤 Profile</a>
                    <a href="notifications.html" class="nav-item">🔔 Notifications</a>
                    <a href="settings.html" class="nav-item">⚙️ Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>Idea Board</span>
                </div>
            </header>

            <div class="page-content">
                <div class="page-title">
                    <span style="font-size: 2.5rem; color: #f1e05a;">💡</span>
                    <h1>Idea Board</h1>
                </div>
                <p class="page-subtitle">Plant your seeds of inspiration. Grow them later.</p>

                <form class="idea-form" id="ideaForm">
                    <input type="text" id="iTitle" class="idea-input" placeholder="What's your brilliant idea? 🌟" required autocomplete="off">
                    <textarea id="iDesc" class="idea-desc" placeholder="Add some details..."></textarea>
                    
                    <div class="idea-actions">
                        <div class="idea-tags" id="formTags">
                            <!-- Selected tags -->
                            <input type="text" id="iTagInput" class="tag-input" placeholder="+ Add tag" autocomplete="off">
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="button" class="btn btn-secondary" title="Use Voice" onclick="alert('Mic access requested!')">🎤</button>
                            <button type="submit" class="btn btn-primary">Save Idea</button>
                        </div>
                    </div>
                </form>

                <div style="margin-bottom: 2rem; display: flex; gap: 0.5rem;" id="filterTags">
                    <span class="tag active" data-tag="all">All</span>
                    <span class="tag" data-tag="product">product</span>
                    <span class="tag" data-tag="marketing">marketing</span>
                    <span class="tag" data-tag="design">design</span>
                </div>

                <div class="ideas-grid" id="ideasGrid">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </main>
    </div>

    <script>
        let ideas = [
            { id: 1, title: 'AI-Powered Search', desc: 'Implement semantic search so users can find notes based on context rather than just exact keyword matches.', tags: ['product', 'ai'], starred: true },
            { id: 2, text: 'Gamify Note-taking', desc: 'Add achievements and streaks to encourage daily writing habits. Maybe a cute mascot that grows?', tags: ['product', 'engagement'], starred: false },
            { id: 3, text: 'Dark Mode Redesign', desc: 'The current dark mode is a bit too gray. Let\'s try a deep blue-black theme inspired by space.', tags: ['design'], starred: true },
            { id: 4, text: 'Weekly Newsletter Template', desc: 'Create a template for users to easily summarize their week\'s notes into a shareable newsletter format.', tags: ['marketing'], starred: false }
        ];

        let activeFilter = 'all';
        let currentFormTags = [];

        const tagInput = document.getElementById('iTagInput');
        
        tagInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const val = tagInput.value.trim().toLowerCase();
                if(val && !currentFormTags.includes(val)) {
                    currentFormTags.push(val);
                    renderFormTags();
                }
                tagInput.value = '';
            }
        });

        function renderFormTags() {
            const container = document.getElementById('formTags');
            // Keep input, remove others
            Array.from(container.children).forEach(c => {
                if(c.id !== 'iTagInput') c.remove();
            });

            currentFormTags.forEach(tag => {
                const el = document.createElement('span');
                el.className = 'tag';
                el.innerHTML = `${tag} &times;`;
                el.onclick = () => {
                    currentFormTags = currentFormTags.filter(t => t !== tag);
                    renderFormTags();
                };
                container.insertBefore(el, tagInput);
            });
        }

        const grid = document.getElementById('ideasGrid');

        function renderIdeas() {
            grid.innerHTML = '';
            
            const filtered = ideas.filter(i => {
                if(activeFilter === 'all') return true;
                return i.tags.includes(activeFilter);
            });

            // sort by starred
            const sorted = [...filtered].sort((a,b) => {
                if(a.starred !== b.starred) return a.starred ? -1 : 1;
                return b.id - a.id;
            });

            sorted.forEach(idea => {
                const title = idea.title || idea.text;
                const div = document.createElement('div');
                div.className = `idea-card ${idea.starred ? 'starred' : ''}`;
                
                div.innerHTML = `
                    <div class="idea-card-header">
                        <h3 class="idea-card-title">${title}</h3>
                        <button class="btn btn-secondary" style="padding: 0.25rem; font-size: 0.8rem;" onclick="toggleStar(${idea.id})">
                            ${idea.starred ? '⭐' : '☆'}
                        </button>
                    </div>
                    <p class="idea-card-desc">${idea.desc}</p>
                    <div class="idea-card-footer">
                        <div class="idea-tags">
                            ${idea.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                        <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem;" onclick="deleteIdea(${idea.id})">🗑️</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        window.toggleStar = (id) => {
            ideas = ideas.map(i => i.id === id ? {...i, starred: !i.starred} : i);
            renderIdeas();
        };

        window.deleteIdea = (id) => {
            ideas = ideas.filter(i => i.id !== id);
            renderIdeas();
        };

        document.getElementById('ideaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            ideas.push({
                id: Date.now(),
                title: document.getElementById('iTitle').value,
                desc: document.getElementById('iDesc').value,
                tags: [...currentFormTags],
                starred: false
            });
            
            document.getElementById('iTitle').value = '';
            document.getElementById('iDesc').value = '';
            currentFormTags = [];
            renderFormTags();
            renderIdeas();
        });

        // Filters
        document.querySelectorAll('#filterTags .tag').forEach(t => {
            t.addEventListener('click', (e) => {
                document.querySelectorAll('#filterTags .tag').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
                activeFilter = e.target.getAttribute('data-tag');
                renderIdeas();
            });
        });

        renderIdeas();
    </script>
</body>
</html>
