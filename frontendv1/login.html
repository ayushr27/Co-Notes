<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .auth-page {
            position: relative;
            overflow: hidden;
            background-color: #0d1117;
        }

        /* Animated background orbs for auth */
        .auth-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
            opacity: 0.5;
        }

        .orb-blue {
            width: 400px;
            height: 400px;
            background: #58a6ff;
            top: -100px;
            right: -100px;
        }

        .orb-purple {
            width: 500px;
            height: 500px;
            background: #bc8cff;
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, 50px) scale(1.1); }
        }

        .premium-auth-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 2.5rem 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            font-size: 2.5rem;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.3));
            transition: transform 0.3s ease;
        }
        
        .auth-logo:hover {
            transform: scale(1.05);
        }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .premium-form-control {
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 14px;
            color: #fff;
            width: 100%;
            transition: all 0.3s ease;
        }

        .premium-form-control:focus {
            background: rgba(13, 17, 23, 0.8);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
            outline: none;
        }

        .form-group label {
            color: #e2e8f0;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .premium-btn {
            background: linear-gradient(135deg, #58a6ff 0%, #3182ce 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.25);
            margin-top: 1rem;
        }

        .premium-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(88, 166, 255, 0.35);
        }

        .premium-btn:disabled {
            opacity: 0.7;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .forgot-pass {
            font-size: 0.8rem;
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-pass:hover {
            color: #79c0ff;
            text-decoration: underline;
        }
        
        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .btn-social {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        
        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>
<body class="auth-page">
    <!-- Glowing background effects -->
    <div class="auth-orb orb-blue"></div>
    <div class="auth-orb orb-purple"></div>

    <div class="premium-auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">📝</a>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Login to continue to your workspace</p>
        </div>

        <!-- Inline error message (hidden by default) -->
        <div id="error-msg" style="
            display: none;
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: #ff7b72;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        "></div>
        


        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" class="premium-form-control"
                    placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                    <label for="password" style="margin-bottom: 0;">Password</label>
                    <a href="#" class="forgot-pass">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" class="premium-form-control"
                    placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn" class="premium-btn">
                Log In
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html" style="color: #fff; text-decoration: none; font-weight: 500;">Sign up</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // If already logged in, go straight to dashboard
        if (localStorage.getItem('token')) {
            window.location.replace('dashboard.html');
        }

        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.innerHTML = loading ? '<span style="display:flex;align-items:center;justify-content:center;gap:8px;"><svg class="animate-spin" style="animation: spin 1s linear infinite;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Logging in...</span>' : 'Log In';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            setLoading(true);
            try {
                const response = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                // Persist JWT token and user profile
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user));

                window.location.replace('dashboard.html');
            } catch (error) {
                showError(error.message || 'Login failed. Please check your credentials.');
                setLoading(false);
            }
        });
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
