<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
</head>
<body class="auth-page">
    <div class="app-background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" style="font-size: 2rem; color: #fff; text-decoration: none;">📝</a>
            <h1 style="color: #fff; margin-top: 1rem; margin-bottom: 0.5rem;">Welcome back</h1>
            <p style="color: var(--text-muted)">Login to continue to your workspace</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label for="password" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.8rem;">Forgot password?</a>
                </div>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            btn.textContent = 'Logging in...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            
            try {
                const response = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                // Store token
                localStorage.setItem('token', response.token);
                
                // Redirect on success
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert(error.message || 'Login failed. Please check your credentials.');
                btn.textContent = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
