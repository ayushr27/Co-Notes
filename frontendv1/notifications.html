<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1.5rem;
        }

        .filter-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            padding-bottom: 0.5rem;
            position: relative;
        }

        .filter-tab.active {
            color: var(--text-heading);
        }

        .filter-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 3px 3px 0 0;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
        }

        .notification-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .notification-item.unread {
            background-color: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--primary-color);
        }

        .notification-item:hover {
            background-color: var(--card-bg);
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-text {
            color: var(--text-color);
            margin-bottom: 0.25rem;
            line-height: 1.5;
        }

        .notification-text strong {
            color: var(--text-heading);
        }

        .notification-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .notification-actions {
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
        }

        .notification-item:hover .notification-actions {
            opacity: 1;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">My Projects</div>
                    <a href="collaborate.html" class="nav-item"><i data-lucide="users" class="nav-icon"></i> Projects</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                    <a href="my-articles.html" class="nav-item"><i data-lucide="newspaper" class="nav-icon"></i> My Articles</a>
<a href="drafts.html" class="nav-item"><i data-lucide="file-clock" class="nav-icon"></i> Drafts</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item active"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                    <a href="trash.html" class="nav-item"><i data-lucide="trash-2" class="nav-icon"></i> Trash</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>Notifications</span>
                </div>
            </header>

            <div class="page-content">
                <div class="page-title">
                    <span style="font-size: 2.5rem; color: #43e97b;"><i data-lucide="bell" class="nav-icon"></i></span>
                    <h1>Inbox</h1>
                </div>

                <div class="notifications-header">
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterNotifs('all', this)">All</button>
                        <button class="filter-tab" onclick="filterNotifs('unread', this)">Unread</button>
                        <button class="filter-tab" onclick="filterNotifs('mentions', this)">Mentions</button>
                    </div>
                    <button class="btn btn-secondary" onclick="markAllRead()" style="font-size: 0.8rem;">✔️ Mark all as read</button>
                </div>

                <div class="notification-list" id="notifList">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();
        let notifications = [];
        const list = document.getElementById('notifList');
        let currentFilter = 'all';

        async function loadNotifications() {
            try {
                const data = await apiFetch('/notifications?limit=50');
                notifications = data.notifications.map(n => ({
                    id: n._id,
                    message: n.message,
                    type: n.type,
                    time: timeAgo(n.createdAt),
                    unread: !n.isRead,
                    link: n.link,
                    dateObj: new Date(n.createdAt)
                }));
                renderNotifs();
            } catch (err) {
                list.innerHTML = `<p style="color:var(--danger); text-align:center; padding:2rem;">Failed to load notifications: ${err.message}</p>`;
            }
        }

        function getIconForType(type) {
            switch(type) {
                case 'article_created':
                case 'article_published': return '<i data-lucide="file-text" class="nav-icon"></i>';
                case 'document_created': return '<i data-lucide="file" class="nav-icon"></i>';
                case 'todo_created':
                case 'todo_completed': return '<i data-lucide="check-square" class="nav-icon"></i>';
                case 'idea_created': return '<i data-lucide="lightbulb" class="nav-icon"></i>';
                case 'mention': return '<i data-lucide="at-sign" class="nav-icon"></i>';
                default: return '<i data-lucide="bell" class="nav-icon"></i>';
            }
        }

        function renderNotifs() {
            list.innerHTML = '';
            
            const filtered = notifications.filter(n => {
                if(currentFilter === 'unread') return n.unread;
                if(currentFilter === 'mentions') return n.type === 'mention';
                return true;
            });

            if(filtered.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">You\'re all caught up!</p>';
                return;
            }

            filtered.forEach(n => {
                const div = document.createElement('div');
                div.className = `notification-item ${n.unread ? 'unread' : ''}`;
                
                div.innerHTML = `
                    <div class="notification-icon">${getIconForType(n.type)}</div>
                    <div class="notification-content">
                        <div class="notification-text">
                            ${n.message}
                        </div>
                        <div class="notification-time">${n.time}</div>
                    </div>
                `;
                
                // Clicking the notification can also read it
                div.addEventListener('click', async (e) => {
                    // Prevent rapid double clicks
                    if (div.style.pointerEvents === 'none') return;
                    
                    if (n.unread) {
                        div.style.pointerEvents = 'none';
                        try {
                            await apiFetch('/notifications/read', {
                                method: 'PUT',
                                body: JSON.stringify({ notificationIds: [n.id] })
                            });
                            n.unread = false;
                            div.classList.remove('unread');
                        } catch(err) {
                            console.error(err);
                        } finally {
                            div.style.pointerEvents = 'auto';
                        }
                    }
                });

                list.appendChild(div);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.filterNotifs = (filter, btn) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderNotifs();
        };

        window.markAllRead = async () => {
            try {
                await apiFetch('/notifications/read', { method: 'PUT', body: JSON.stringify({}) });
                notifications.forEach(n => n.unread = false);
                renderNotifs();
            } catch (err) {
                alert('Error marking as read: ' + err.message);
            }
        };

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        function timeAgo(dateString) {
            const d = new Date(dateString);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 60000) return "just now";
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
            
            return d.toLocaleDateString();
        }

        loadNotifications();
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>
</html>
