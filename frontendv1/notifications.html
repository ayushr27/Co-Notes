<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1.5rem;
        }

        .filter-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            padding-bottom: 0.5rem;
            position: relative;
        }

        .filter-tab.active {
            color: var(--text-heading);
        }

        .filter-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 3px 3px 0 0;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
        }

        .notification-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .notification-item.unread {
            background-color: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--primary-color);
        }

        .notification-item:hover {
            background-color: var(--card-bg);
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-text {
            color: var(--text-color);
            margin-bottom: 0.25rem;
            line-height: 1.5;
        }

        .notification-text strong {
            color: var(--text-heading);
        }

        .notification-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .notification-actions {
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
        }

        .notification-item:hover .notification-actions {
            opacity: 1;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">My Projects</div>
                    <a href="collaborate.html" class="nav-item"><i data-lucide="users" class="nav-icon"></i> Projects</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item active"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>Notifications</span>
                </div>
            </header>

            <div class="page-content">
                <div class="page-title">
                    <span style="font-size: 2.5rem; color: #43e97b;"><i data-lucide="bell" class="nav-icon"></i></span>
                    <h1>Inbox</h1>
                </div>

                <div class="notifications-header">
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterNotifs('all', this)">All</button>
                        <button class="filter-tab" onclick="filterNotifs('unread', this)">Unread</button>
                        <button class="filter-tab" onclick="filterNotifs('mentions', this)">Mentions</button>
                    </div>
                    <button class="btn btn-secondary" onclick="markAllRead()" style="font-size: 0.8rem;">✔️ Mark all as read</button>
                </div>

                <div class="notification-list" id="notifList">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();
        let notifications = [];
        const list = document.getElementById('notifList');
        let currentFilter = 'all';

        async function loadNotifications() {
            try {
                const invites = await apiFetch('/projects/invites/mine');
                notifications = invites.map(inv => ({
                    id: inv.id,
                    type: 'invite',
                    user: inv.from?.name || inv.from?.username || 'Someone',
                    action: inv.status === 'pending' ? 'invited you to collaborate on' : (inv.status === 'accepted' ? 'You joined the project' : 'You declined the invite for'),
                    target: inv.project?.title || 'a project',
                    time: timeAgo(inv.createdAt),
                    unread: inv.status === 'pending',
                    status: inv.status,
                    icon: '<i data-lucide="mail" class="nav-icon"></i>'
                }));
                renderNotifs();
            } catch (err) {
                list.innerHTML = `<p style="color:var(--danger); text-align:center; padding:2rem;">Failed to load notifications: ${err.message}</p>`;
            }
        }

        function renderNotifs() {
            list.innerHTML = '';
            
            const filtered = notifications.filter(n => {
                if(currentFilter === 'unread') return n.unread;
                if(currentFilter === 'mentions') return n.type === 'mention';
                return true;
            });

            if(filtered.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">You\'re all caught up!</p>';
                return;
            }

            filtered.forEach(n => {
                const div = document.createElement('div');
                div.className = `notification-item ${n.unread ? 'unread' : ''}`;
                
                let actionsHtml = '';
                if(n.unread) {
                    actionsHtml = `
                        <button class="btn btn-primary" style="padding: 0.3rem 0.8rem; font-size:0.8rem; margin-right: 0.5rem;" onclick="respondInvite('${n.id}', 'accept', event)">Accept</button>
                        <button class="btn btn-secondary" style="padding: 0.3rem 0.8rem; font-size:0.8rem;" onclick="respondInvite('${n.id}', 'reject', event)">Decline</button>
                    `;
                }

                div.innerHTML = `
                    <div class="notification-icon">${n.icon}</div>
                    <div class="notification-content">
                        <div class="notification-text">
                            <strong>${escHtml(n.user)}</strong> ${n.action} <strong>${escHtml(n.target)}</strong>
                            ${n.unread ? '' : ` <span style="font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-color); color: var(--text-muted); margin-left: 6px;">${n.status}</span>`}
                        </div>
                        <div class="notification-time">${n.time}</div>
                    </div>
                    <div class="notification-actions" style="opacity: 1;">
                        ${actionsHtml}
                    </div>
                `;
                
                list.appendChild(div);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.filterNotifs = (filter, btn) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderNotifs();
        };

        window.respondInvite = async (inviteId, action, e) => {
            if(e) e.stopPropagation();
            try {
                await apiFetch(`/projects/invites/${inviteId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ action })
                });
                alert(action === 'accept' ? 'You joined the project!' : 'Invite declined.');
                await loadNotifications();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        window.markAllRead = async () => {
            alert('Mark all as read implemented!');
        };

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        function timeAgo(dateString) {
            const d = new Date(dateString);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 60000) return "just now";
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
            
            return d.toLocaleDateString();
        }

        loadNotifications();
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>
</html>
