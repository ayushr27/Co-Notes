<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .search-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .large-search-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem 1.5rem 1.5rem 3.5rem;
            font-size: 1.25rem;
            color: var(--text-heading);
            transition: all 0.2s;
            outline: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%238b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat;
            background-position: 1rem center;
        }

        .large-search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.2);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%2358a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
        }

        .filters-row {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-pill:hover,
        .filter-pill.active {
            background-color: rgba(88, 166, 255, 0.1);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .search-results {
            margin-top: 3rem;
        }

        .result-item {
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .result-item:hover {
            transform: translateX(5px);
            border-color: #8b949e;
        }

        .result-title {
            color: var(--text-heading);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .result-path {
            font-size: 0.8rem;
            color: var(--primary-color);
        }

        .result-snippet {
            color: var(--text-muted);
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .highlight {
            background-color: rgba(227, 179, 65, 0.3);
            color: var(--text-heading);
            padding: 0 0.2rem;
            border-radius: 2px;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                    <a href="collaborate.html" class="nav-item"><i data-lucide="users" class="nav-icon"></i> Collaborate</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>Search Workspace</span>
                </div>
                <div class="header-right">
                    <a href="dashboard.html" class="btn btn-secondary">✕ Close Search</a>
                </div>
            </header>

            <div class="page-content" style="padding-top: 0.5rem;">
                <div class="search-container">
                    <input type="text" id="globalSearch" class="large-search-input"
                        placeholder="Search across documents, ideas, and collections..." autofocus>

                    <div class="filters-row">
                        <button class="filter-pill active">All Results</button>
                        <button class="filter-pill">📄 Documents</button>
                        <button class="filter-pill"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</button>
                        <button class="filter-pill"><i data-lucide="check-square" class="nav-icon"></i> Tasks</button>
                        <button class="filter-pill"><i data-lucide="folder" class="nav-icon"></i> Collections</button>
                        <button class="filter-pill"><i data-lucide="globe" class="nav-icon"></i> Community</button>
                    </div>

                    <div class="search-results" id="searchResults">
                        <!-- Simulated Results -->
                        <p style="color: var(--text-muted); text-align: center; margin-top: 4rem;">Start typing to
                            search your entire workspace...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();

        const searchInput = document.getElementById('globalSearch');
        const searchResults = document.getElementById('searchResults');

        let activeFilter = 'All Results';

        let timeout = null;

        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            const query = e.target.value.toLowerCase().trim();

            if (!query) {
                searchResults.innerHTML = '<p style="color: var(--text-muted); text-align: center; margin-top: 4rem;">Start typing to search your entire workspace...</p>';
                return;
            }

            searchResults.innerHTML = '<p style="color: var(--text-muted);">Searching...</p>';

            timeout = setTimeout(async () => {
                try {
                    const response = await apiFetch(`/search?q=${encodeURIComponent(query)}`);

                    let allResults = [];
                    if (response.documents) {
                        response.documents.forEach(d => allResults.push({ type: '📄 Documents', title: d.title || 'Untitled', path: 'Workspace', content: 'Document', link: `document.html?id=${d._id}` }));
                    }
                    if (response.collections) {
                        response.collections.forEach(c => allResults.push({ type: '<i data-lucide="folder" class="nav-icon"></i> Collections', title: c.name || 'Unnamed', path: 'Collections', content: c.description || 'Collection', link: `document.html?collection=${c._id}` }));
                    }
                    if (response.articles) {
                        response.articles.forEach(a => allResults.push({ type: '<i data-lucide="globe" class="nav-icon"></i> Community', title: a.title || 'Untitled', path: 'Articles', content: 'Published Article', link: `article-detail.html?id=${a.id || a._id}` }));
                    }
                    if (response.ideas) {
                        response.ideas.forEach(i => allResults.push({ type: '<i data-lucide="lightbulb" class="nav-icon"></i> Ideas', title: i.title || 'Untitled', path: 'Idea Board', content: i.description || 'Idea', link: 'ideas.html' }));
                    }

                    // Apply filter
                    if (activeFilter !== 'All Results') {
                        allResults = allResults.filter(item => item.type === activeFilter);
                    }

                    if (allResults.length === 0) {
                        searchResults.innerHTML = `
                            <div style="text-align: center; margin-top: 3rem;">
                                <div style="font-size: 3rem; margin-bottom: 1rem;"><i data-lucide="search" class="nav-icon"></i></div>
                                <h3 style="color: var(--text-heading);">No results found for "${query}"</h3>
                                <p style="color: var(--text-muted);">Try searching for something else or check your spelling.</p>
                            </div>
                        `;
                        return;
                    }

                    searchResults.innerHTML = `<p style="color: var(--text-muted); margin-bottom: 1.5rem;">Found ${allResults.length} results</p>`;

                    allResults.forEach(item => {
                        const el = document.createElement('a');
                        el.href = item.link;
                        el.className = 'result-item';

                        // Simple highlighting
                        const regex = new RegExp(`(${query})`, 'gi');
                        const highlightedContent = (item.content || '').replace(regex, '<span class="highlight">$1</span>');
                        const highlightedTitle = (item.title || '').replace(regex, '<span class="highlight">$1</span>');

                        el.innerHTML = `
                            <div class="result-path">${item.type} • ${item.path}</div>
                            <div class="result-title">${highlightedTitle}</div>
                            <div class="result-snippet">${highlightedContent}</div>
                        `;
                        searchResults.appendChild(el);
                    });
                } catch (error) {
                    console.error('Search error', error);
                    searchResults.innerHTML = '<p style="color: var(--danger-color); text-align: center;">Error performing search. Please try again later.</p>';
                }
            }, 300);
        });

        // Filter pills active state
        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                activeFilter = e.target.textContent;
                // re-trigger search
                searchInput.dispatchEvent(new Event('input'));
            });
        });
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>

</html>
