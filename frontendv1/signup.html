<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
</head>

<body class="auth-page">
    <div class="app-background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" style="font-size: 2rem; color: #fff; text-decoration: none;">📝</a>
            <h1 style="color: #fff; margin-top: 1rem; margin-bottom: 0.5rem;">Create an account</h1>
            <p style="color: var(--text-muted)">Join Co-Notes to start writing</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="janedoe" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;

            btn.textContent = 'Creating Account...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            try {
                const response = await apiFetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ name, username, email, password })
                });

                // Store token and redirect
                localStorage.setItem('token', response.token);
                alert('Account created successfully!');
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert(error.message || 'Signup failed. Please try a different username or email.');
                btn.textContent = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
