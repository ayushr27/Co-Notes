<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List - Co-Notes</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .todo-header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .todo-progress {
            background-color: var(--card-bg);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .progress-bar-container {
            flex: 1;
            height: 8px;
            background-color: var(--bg-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.3s ease;
        }

        .todo-list {
            margin-top: 1.5rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .todo-item:hover {
            border-color: #8b949e;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            margin-right: 1rem;
            cursor: pointer;
            position: relative;
            outline: none;
            transition: all 0.2s;
        }

        .todo-item.priority-high .todo-checkbox {
            border-color: var(--danger-color);
        }

        .todo-item.priority-medium .todo-checkbox {
            border-color: #e3b341;
        }

        .todo-item.priority-low .todo-checkbox {
            border-color: var(--success-color);
        }

        .todo-checkbox:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .todo-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            left: 3px;
            top: -1px;
        }

        .todo-content {
            flex: 1;
        }

        .todo-text {
            font-size: 1.05rem;
            display: block;
            margin-bottom: 0.25rem;
        }

        .todo-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.8rem;
        }

        .todo-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .todo-item:hover .todo-actions {
            opacity: 1;
        }

        .new-todo-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .new-todo-form input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        .new-todo-form select {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            border-radius: 4px;
            outline: none;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">
                    <span><i data-lucide="file-text" class="nav-icon" style="color: var(--primary-color)"></i></span> Co-Notes
                </a>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Home</div>
                    <a href="dashboard.html" class="nav-item"><i data-lucide="home" class="nav-icon"></i> Dashboard</a>
                    <a href="collections.html" class="nav-item"><i data-lucide="folder" class="nav-icon"></i> Collections</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Quick Links</div>
                    <a href="ideas.html" class="nav-item"><i data-lucide="lightbulb" class="nav-icon"></i> Ideas</a>
                    <a href="quick-notes.html" class="nav-item"><i data-lucide="zap" class="nav-icon"></i> Quick Notes</a>
                    <a href="todos.html" class="nav-item active"><i data-lucide="check-square" class="nav-icon"></i> To-Do List</a>
                    <a href="collaborate.html" class="nav-item"><i data-lucide="users" class="nav-icon"></i> Collaborate</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Community</div>
                    <a href="community.html" class="nav-item"><i data-lucide="globe" class="nav-icon"></i> Feed</a>
                    <a href="write-article.html" class="nav-item"><i data-lucide="pen-tool" class="nav-icon"></i> Write Article</a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profile.html" class="nav-item"><i data-lucide="user" class="nav-icon"></i> Profile</a>
                    <a href="notifications.html" class="nav-item"><i data-lucide="bell" class="nav-icon"></i> Notifications</a>
                    <a href="settings.html" class="nav-item"><i data-lucide="settings" class="nav-icon"></i> Settings</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span>To-Do List</span>
                </div>
            </header>

            <div class="page-content">
                <div class="todo-header-card">
                    <div>
                        <div class="page-title">
                            <span style="font-size: 2.5rem; color: #58a6ff;"><i data-lucide="check-square" class="nav-icon"></i></span>
                            <h1>To-Do List</h1>
                        </div>
                        <p class="page-subtitle" id="taskCountText">4 tasks remaining • 1 completed</p>
                    </div>
                </div>

                <div class="todo-progress">
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progressBar" style="width: 20%;"></div>
                    </div>
                    <span style="font-weight: bold; width: 45px; text-align: right;" id="progressText">20%</span>
                </div>

                <form class="new-todo-form" id="todoForm">
                    <input type="text" id="todoInput" placeholder="What needs to be done?" required autocomplete="off">
                    <select id="todoPriority">
                        <option value="medium">🟡 Medium</option>
                        <option value="high">🔴 High</option>
                        <option value="low">🟢 Low</option>
                    </select>
                    <select id="todoCategory">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>

                <div class="todo-list" id="todoList">
                    <!-- Dynamic rendering -->
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
        checkAuth();

        let todos = [];

        const list = document.getElementById('todoList');

        function getBadgeClass(cat) {
            return 'badge';
        }

        function updateProgress() {
            if (todos.length === 0) {
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressText').innerText = '0%';
                document.getElementById('taskCountText').innerText = '0 tasks remaining • 0 completed';
                return;
            }
            const completed = todos.filter(t => t.completed).length;
            const active = todos.length - completed;
            const pct = Math.round((completed / todos.length) * 100);

            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').innerText = pct + '%';
            document.getElementById('taskCountText').innerText = `${active} tasks remaining • ${completed} completed`;
        }

        function renderTodos() {
            list.innerHTML = '';

            // sort to put completed at the bottom
            const sortedTodos = [...todos].sort((a, b) => {
                const aDone = a.isCompleted || a.completed;
                const bDone = b.isCompleted || b.completed;
                if (aDone !== bDone) return aDone ? 1 : -1;
                return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
            });

            sortedTodos.forEach(todo => {
                const isCompleted = todo.isCompleted || todo.completed;
                const id = todo._id || todo.id;

                const div = document.createElement('div');
                div.className = `todo-item priority-${todo.priority} ${isCompleted ? 'completed' : ''}`;

                div.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" ${isCompleted ? 'checked' : ''} onchange="toggleTodo('${id}')">
                    <div class="todo-content">
                        <span class="todo-text">${todo.text}</span>
                        <div class="todo-meta">
                            <span class="badge" style="background-color: var(--glass-bg);">${todo.category}</span>
                            <span class="badge" style="background-color: transparent; border: 1px solid var(--border-color);">${(todo.priority || 'medium').toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="todo-actions">
                        <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem;" onclick="deleteTodo('${id}')"><i data-lucide="trash-2" class="nav-icon"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
            updateProgress();
        }

        async function fetchTodos() {
            try {
                const response = await apiFetch('/todos');
                todos = response.todos || response || [];
                // standardise completed 
                todos = todos.map(t => ({ ...t, completed: t.isCompleted }));
                renderTodos();
            } catch (error) {
                console.error('Failed to fetch todos:', error);
            }
        }

        window.toggleTodo = async (id) => {
            const todo = todos.find(t => (t._id || t.id) === id);
            if (!todo) return;

            const newDone = !(todo.isCompleted || todo.completed);
            todo.isCompleted = newDone;
            todo.completed = newDone;
            renderTodos();

            try {
                await apiFetch(`/todos/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ isCompleted: newDone })
                });
            } catch (error) {
                todo.isCompleted = !newDone;
                todo.completed = !newDone;
                renderTodos();
                alert('Failed to update todo');
            }
        };

        window.deleteTodo = async (id) => {
            if (!confirm("Delete this task?")) return;
            try {
                await apiFetch(`/todos/${id}`, { method: 'DELETE' });
                todos = todos.filter(t => (t._id || t.id) !== id);
                renderTodos();
            } catch (error) {
                alert('Failed to delete todo');
            }
        };

        document.getElementById('todoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;

            const payload = {
                text: document.getElementById('todoInput').value,
                priority: document.getElementById('todoPriority').value,
                category: document.getElementById('todoCategory').value
            };

            try {
                const response = await apiFetch('/todos', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const newTodo = response.todo || response;
                newTodo.completed = newTodo.isCompleted;
                todos.unshift(newTodo);

                document.getElementById('todoInput').value = '';
                renderTodos();
            } catch (error) {
                alert('Failed to add task: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Initial fetch
        fetchTodos();
    </script>
    <script>
        if(typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>

</html>
